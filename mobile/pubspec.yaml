name: scalp_signals
description: >-
  Aplikasi sinyal scalping cryptocurrency (timeframe 1 jam) berbasis data
  Binance real-time. Semua lalu lintas keluar diarahkan melalui proxy HTTP
  terautentikasi. Menjalankan 5 strategi scalping dengan asymmetric risk:reward.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local cache / persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # WebSocket (dipakai bersama Socket kustom untuk tunneling proxy CONNECT)
  web_socket_channel: ^2.4.5

  # Notifikasi lokal + getaran
  flutter_local_notifications: ^17.2.1
  vibration: ^3.1.0
  audioplayers: ^6.0.0

  # Eksekusi latar belakang (cek candle 1 jam saat app di background)
  workmanager: ^0.6.0

  # Utility
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
