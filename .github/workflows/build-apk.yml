name: Build APK

# Membangun APK release (debug-signed, langsung dapat dipasang) di runner
# GitHub x86_64 — menghindari masalah aapt2 ARM64 saat build lokal di Termux.
# Unduh hasilnya dari tab "Artifacts" pada run ini.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform scaffolding (Android)
        # Menambah berkas yang tidak disertakan di repo (Gradle wrapper jar,
        # gradlew, local.properties, dll). Berkas kustom yang sudah ada
        # (AndroidManifest, build.gradle, MainActivity, dll) TIDAK ditimpa.
        run: flutter create . --project-name scalp_signals --org com.scalpsignals --platforms=android

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scalp-signals-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
